[build]
  command = "vite build"
  publish = "dist/client"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # Ensure the SSR bundle is included with the function at deploy time.
  included_files = ["dist/server/**"]

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
